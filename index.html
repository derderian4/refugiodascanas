<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refugio das Canas</title>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>🏡 Refugio das Canas</h1>
  <p>Seu guia local</p>
</header>

<main>

  <section class="cards">

    <div class="card">
      <h2>🍽 Restaurantes</h2>
      <p>Descubra onde comer bem</p>
      <button onclick="openMap('restaurantes')">Ver opções</button>
    </div>

    <div class="card">
      <h2>📍 Pontos Turísticos</h2>
      <p>Lugares imperdíveis</p>
      <button onclick="openMap('turismo')">Explorar</button>
    </div>

    <div class="card">
      <h2>🎉 O que fazer</h2>
      <p>Atividades e passeios</p>
      <button onclick="openMap('atividades')">Descobrir</button>
    </div>

  </section>

</main>

<footer>
  <p>© 2026 Pousada Exemplo</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
